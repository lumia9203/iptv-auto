name: update iptv

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: pip install requests
      - run: python convert.py
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add live.m3u
          git commit -m "update" || echo no change
          git push
